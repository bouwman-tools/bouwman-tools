<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bouwman.tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FDF6F0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #2C1A0E;
      padding: 32px 32px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 1.4rem; font-weight: 700; color: #F5EBE0; letter-spacing: -.01em; }
    .logo span { color: #E8784F; }
    .user-bar { display: flex; align-items: center; gap: 12px; }
    .user-email { font-size: 0.78rem; color: #A07860; }
    .logout-link {
      font-size: 0.72rem; color: #A07860; text-decoration: none;
      border: 1px solid #4a2e1a; padding: 4px 12px; border-radius: 20px;
      transition: color .2s, border-color .2s;
    }
    .logout-link:hover { color: #F5EBE0; border-color: #A07860; }
    main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
      width: 100%;
    }
    .section-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #A07860; margin-bottom: 16px; margin-top: 36px;
    }
    .section-label:first-of-type { margin-top: 0; }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .tool-card {
      display: flex; flex-direction: column; gap: 8px;
      background: #fff; border: 1px solid #E8C4A8; border-radius: 12px;
      padding: 22px 22px 20px; text-decoration: none; color: inherit;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .tool-card:hover {
      border-color: #C0522A;
      box-shadow: 0 4px 16px rgba(192,82,42,.12);
      transform: translateY(-2px);
    }
    .tool-icon { font-size: 1.6rem; line-height: 1; }
    .tool-name { font-size: 1rem; font-weight: 700; color: #2C1A0E; }
    .tool-desc { font-size: 0.82rem; color: #A07860; line-height: 1.4; }
    .tool-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tool-tag {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: #C0522A; background: #FDF6F0;
      border: 1px solid #E8C4A8; border-radius: 4px; padding: 2px 8px;
    }
    .tool-tag.ai { color: #7C4DBA; background: #F5F0FC; border-color: #D4B8F0; }
    .tool-tag.privacy-local {
      display: inline-flex; align-items: center; gap: 5px;
      color: #15803d; background: #f0fdf4; border-color: #bbf7d0;
      text-transform: none; letter-spacing: 0; font-weight: 500;
    }
    .tool-tag.privacy-local::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
    }
    .tool-tag.privacy-ai {
      display: inline-flex; align-items: center; gap: 5px;
      color: #92400e; background: #fffbeb; border-color: #fde68a;
      text-transform: none; letter-spacing: 0; font-weight: 500;
    }
    .tool-tag.privacy-ai::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #f59e0b; flex-shrink: 0;
    }
    .no-tools {
      text-align: center; padding: 48px 24px; color: #A07860; font-size: 0.9rem;
    }
    footer {
      text-align: center; padding: 20px; font-size: 0.75rem;
      color: #A07860; border-top: 1px solid #E8C4A8;
    }
    .admin-panel {
      margin-top: 48px; border-top: 2px dashed #E8C4A8; padding-top: 32px;
    }
    .admin-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #C0522A; margin-bottom: 20px;
    }
    .admin-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px;
    }
    .admin-card {
      background: #fff; border: 1px solid #E8C4A8; border-radius: 12px;
      padding: 20px 20px 18px;
    }
    .admin-card h3 {
      font-size: 0.9rem; font-weight: 700; color: #2C1A0E;
      margin: 0 0 10px; display: flex; align-items: center; gap: 8px;
    }
    .admin-card ol, .admin-card ul {
      margin: 0; padding-left: 18px; font-size: 0.82rem;
      color: #5a3e2e; line-height: 1.7;
    }
    .admin-card code {
      background: #FDF6F0; border: 1px solid #E8C4A8; border-radius: 4px;
      padding: 1px 6px; font-size: 0.78rem; color: #C0522A;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">bouwman<span>.tools</span></div>
    <div class="user-bar">
      <span class="user-email" id="user-email"></span>
      <a href="/cdn-cgi/access/logout" class="logout-link">Uitloggen</a>
    </div>
  </header>

  <main id="main-content">
    <div class="no-tools">Tools laden…</div>
  </main>

  <footer>bouwman.tools &mdash; gebouwd door Sylvain Bouwman</footer>

  <script>

    const TOOLS = [
      {
        section: 'Accountancy & Jaarrekening',
        items: [
          { file: 'https://xaf.bouwman.tools/', icon: '📊', name: 'XAF Raw Export',
            desc: 'Verwerk XAF-auditfiles (3.2 & 4.0) naar Excel of CSV — volledig in de browser, ook voor bestanden van 700 MB+',
            tags: [{l:'Accountancy'},{l:'Lokaal',c:'privacy-local'}] },
          { file: 'https://auditfile-app.streamlit.app/', icon: '🧾', name: 'Auditfile App',
            desc: 'Analyseer XAF-auditfiles en exporteer gestructureerde overzichten per grootboekrekening of kostensoort',
            tags: [{l:'Accountancy'},{l:'Bèta',c:'privacy-ai'},{l:'Streamlit'}] },
        ]
      },
      {
        section: 'Auto & Mobiliteit',
        items: [
          { file: 'auto-fiscaal-2027.html', icon: '🚗', name: 'Auto Fiscaal 2027',
            desc: 'Gecombineerde tool voor eindheffing, youngtimer-bijtelling en RDW-kentekenlookup — alle grote autowijzigingen per 1 januari 2027',
            tags: [{l:'Auto'},{l:'RDW'},{l:'Kenteken via RDW',c:'privacy-local'}] },
          { file: 'join-auto-rekenmodel.html', icon: '⚖️', name: 'Auto van de Zaak',
            desc: 'Bereken snel of een auto op de zaak of privé fiscaal gunstiger uitpakt',
            tags: [{l:'Auto'},{l:'Lokaal',c:'privacy-local'}] },
        ]
      },
      {
        section: 'BV & DGA',
        items: [
          { file: 'bv_janee_DK.html', icon: '🏢', name: 'BV Ja/Nee',
            desc: 'Doorrekenen of een klant belastingtechnisch beter af is met een BV dan als eenmanszaak',
            tags: [{l:'BV'},{l:'Lokaal',c:'privacy-local'}] },
          { file: 'join-bv-documenten.html', icon: '📄', name: 'Sjablonen DGA',
            desc: 'Genereer juridische documenten voor de inrichting van een holdingstructuur voor een DGA',
            tags: [{l:'BV'},{l:'DGA'},{l:'Lokaal',c:'privacy-local'}] },
          { file: 'rc-schuld-dga.html', icon: '💰', name: 'Rekeningcourant + Dividend',
            desc: 'Bereken de optimale aflossingsroute van een rekening-courantschuld voor een DGA',
            tags: [{l:'BV'},{l:'DGA'},{l:'Lokaal',c:'privacy-local'}] },
          { file: 'gebruikelijk-loon.html', icon: '💶', name: 'Gebruikelijk loon',
            desc: 'Toets het DGA-loon aan de wettelijke norm — vergelijkingsloon, hoogste werknemer en afroommethode',
            tags: [{l:'BV'},{l:'DGA'},{l:'Lokaal',c:'privacy-local'}] },
          { file: 'dividend-uitkeringstoets.html', icon: '📋', name: 'Dividend & Uitkeringstoets',
            desc: 'Balanstoets en liquiditeitstoets (art. 2:216 BW) doorlopen en direct AVA-notulen en bestuursbesluit genereren',
            tags: [{l:'BV'},{l:'DGA'},{l:'Lokaal',c:'privacy-local'}] },
          { file: 'herstructurering-assistent-v3.html', icon: '🔄', name: 'Herstructurering',
            desc: 'Stap-voor-stap herstructureringstrajecten doorrekenen en adviseren via AI',
            tags: [{l:'BV'},{l:'AI',c:'ai'},{l:'Via Anthropic API',c:'privacy-ai'}] },
        ]
      },
      {
        section: 'Loonheffing & WKR',
        items: [
          { file: 'join-wkr-agent-intern.html', icon: '🤖', name: 'WKR Agent (intern)',
            desc: 'AI-assistent voor vragen over de werkkostenregeling — interne versie',
            tags: [{l:'WKR'},{l:'AI',c:'ai'},{l:'Via Anthropic API',c:'privacy-ai'}] },
          { file: 'join-wkr-agent-extern.html', icon: '🤖', name: 'WKR Agent (extern)',
            desc: 'AI-assistent voor vragen over de werkkostenregeling — versie voor klanten',
            tags: [{l:'WKR'},{l:'AI',c:'ai'},{l:'Via Anthropic API',c:'privacy-ai'}] },
          { file: 'nhg-werkgeversverklaring-wizard.html', icon: '🏠', name: 'Werkgeversverklaring NHG',
            desc: 'Genereer snel en foutloos een NHG-werkgeversverklaring via een stap-voor-stap wizard',
            tags: [{l:'HR'},{l:'NHG'},{l:'Lokaal',c:'privacy-local'}] },
        ]
      },
      {
        section: 'BTW & Omzetbelasting',
        items: [
          { file: 'btw-teruggaaf-eu.html', icon: '🇪🇺', name: 'BTW Teruggaaf EU',
            desc: 'Bereken en onderbouw een BTW-teruggaafverzoek voor kosten gemaakt in EU-landen',
            tags: [{l:'BTW'},{l:'EU'},{l:'Bèta',c:'privacy-ai'},{l:'Lokaal',c:'privacy-local'}] },
        ]
      },
      {
        section: 'Belastingdienst',
        items: [
          { file: 'kennisgroepen-zoeker.html', icon: '📚', name: 'Kennisgroepen-zoeker',
            desc: 'Zoek en analyseer kennisgroepstandpunten van de Belastingdienst via AI',
            tags: [{l:'Belastingdienst'},{l:'AI',c:'ai'},{l:'Via Anthropic API',c:'privacy-ai'}] },
        ]
      },
      {
        section: 'Arbeidsrecht & Compliance',
        items: [
          { file: 'https://dba-risicoscan.streamlit.app/', icon: '🤝', name: 'DBA Risicoscan',
            desc: 'Indicatieve beoordeling van de arbeidsrelatie op basis van de negen gezichtspunten uit het Deliveroo/Uber-arrest',
            tags: [{l:'DBA'},{l:'Arbeidsrecht'},{l:'Bèta',c:'privacy-ai'},{l:'Via Anthropic API',c:'privacy-ai'},{l:'Streamlit'}] },
          { file: 'https://wwft-check.streamlit.app/', icon: '🔎', name: 'WWFT Check',
            desc: 'Cliëntenonderzoek conform WWFT — KvK-data, sanctiescreening en PDF-rapportage',
            tags: [{l:'WWFT'},{l:'Compliance'},{l:'Bèta',c:'privacy-ai'},{l:'Via Anthropic API',c:'privacy-ai'},{l:'Streamlit'}] },
        ]
      },
      {
        section: 'Administratie & Archief',
        items: [
          { file: 'bewaarplicht.html', icon: '📁', name: 'Bewaarplicht Checker',
            desc: 'Bereken de wettelijke bewaartermijn (AWR art. 52) voor elk documenttype — inclusief einddatum',
            tags: [{l:'Bewaarplicht'},{l:'AWR'},{l:'Administratie'}] },
        ]
      },
      {
        section: 'Overig',
        items: [
          { file: 'kvk-zoeker.html', icon: '🔍', name: 'KvK Nummers Zoeken',
            desc: 'Laad een Excel in en vul automatisch KvK-nummers aan — voor Payroll',
            tags: [{l:'Payroll'},{l:'KvK'}] },
        ]
      },
    ];

    async function getEmail() {
      try {
        const res = await fetch('/cdn-cgi/access/get-identity');
        if (!res.ok) return null;
        const data = await res.json();
        return data.email || null;
      } catch { return null; }
    }

    function canSee(file, access) {
      if (!access) return true;
      if (access === 'all') return true;
      return access.includes(file);
    }

    async function render() {
      const email = await getEmail();
      let access = [];
      if (email) {
        try {
          const res = await fetch('https://access-beheer.s-bouwman.workers.dev/permissions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          access = (await res.json()).access ?? [];
        } catch { access = []; }
      }

      if (email) {
        document.getElementById('user-email').textContent = email;
      }

      const main = document.getElementById('main-content');
      let html = '';
      let anyVisible = false;

      for (const section of TOOLS) {
        const visible = section.items.filter(t => canSee(t.file, access));
        if (!visible.length) continue;
        anyVisible = true;
        html += `<div class="section-label">${section.section}</div><div class="tools-grid">`;
        for (const t of visible) {
          const tags = t.tags.map(tag =>
            `<span class="tool-tag${tag.c ? ' '+tag.c : ''}">${tag.l}</span>`
          ).join('');
          html += `
            <a href="${t.file}" class="tool-card"${t.file.startsWith('http') ? ' target="_blank" rel="noopener"' : ''}>
              <div class="tool-icon">${t.icon}</div>
              <div class="tool-name">${t.name}</div>
              <div class="tool-desc">${t.desc}</div>
              <div class="tool-tags">${tags}</div>
            </a>`;
        }
        html += '</div>';
      }

      if (access === 'all') {
        html += `
          <div class="admin-panel">
            <div class="admin-title">⚙️ Beheer — alleen zichtbaar voor jou</div>
            <div class="admin-grid">

              <div class="admin-card">
                <h3>👤 Nieuwe gebruiker toevoegen</h3>
                <ol>
                  <li>Open <code>portal.html</code> in de bouwman-tools repo</li>
                  <li>Zoek het <code>TOEGANG</code>-object bovenaan het script</li>
                  <li>Voeg een regel toe:<br>
                    <code>'email@kantoor.nl': 'all'</code><br>
                    of beperkt:<br>
                    <code>'email@kantoor.nl': ['auto-fiscaal-2027.html']</code>
                  </li>
                  <li>Sla op en push naar GitHub</li>
                  <li>Nodig de gebruiker uit via Cloudflare (zie kaart rechts)</li>
                </ol>
              </div>

              <div class="admin-card">
                <h3>☁️ Uitnodigen via Cloudflare</h3>
                <ol>
                  <li>Ga naar <strong>one.dash.cloudflare.com</strong></li>
                  <li>Zero Trust → Access → Applications</li>
                  <li>Klik op de juiste app (bijv. <em>bouwman.tools</em>)</li>
                  <li>Edit → Policies → voeg e-mailadres toe onder <em>Include</em></li>
                  <li>De gebruiker ontvangt een OTP per mail bij eerste bezoek</li>
                </ol>
              </div>

              <div class="admin-card">
                <h3>🔧 Toegang tot specifieke tools</h3>
                <ul>
                  <li>Gebruik <code>'all'</code> voor volledige toegang</li>
                  <li>Gebruik een array voor beperkte toegang</li>
                  <li>Bestandsnaam = de <code>file</code>-waarde uit de TOOLS-lijst</li>
                  <li>Externe tools (andere subdomeinen) gebruik je als volledige URL:<br>
                    <code>'https://xaf.bouwman.tools/'</code></li>
                  <li>Onbekende e-mails zien standaard <strong>alle</strong> tools — voeg ze toe aan TOEGANG om te beperken</li>
                </ul>
              </div>

              <div class="admin-card">
                <h3>🛠️ Nieuwe tool toevoegen aan portal</h3>
                <ol>
                  <li>Maak een nieuwe repo aan met <code>index.html</code> en <code>CNAME</code></li>
                  <li>Push naar GitHub, Pages aanzetten</li>
                  <li>DNS CNAME toevoegen in Cloudflare (DNS only voor GitHub Pages)</li>
                  <li>Voeg de tool toe aan het <code>TOOLS</code>-object in <code>portal.html</code></li>
                  <li>Voeg het Cloudflare Access toe als aparte Application voor het subdomein</li>
                </ol>
              </div>

            </div>
          </div>`;
      }

      main.innerHTML = anyVisible ? html
        : '<div class="no-tools">Je hebt nog geen toegang tot tools. Neem contact op met Sylvain Bouwman.</div>';
    }

    render();
  </script>

</body>
</html>
